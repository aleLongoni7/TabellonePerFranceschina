<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tabellone per la mia polpetta</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --dark-bg: linear-gradient(160deg,#0f2027,#203a43,#2c5364);
  --light-bg: linear-gradient(160deg,#f5f7fa,#c3cfe2);
  --led-red:#ff3b3b;
  --led-blue:#3b9eff;
  --panel-dark: rgba(255,255,255,0.1);
  --panel-light: rgba(0,0,0,0.08);
}

*{ box-sizing:border-box; margin:0; padding:0; }

body{
  font-family:"Segoe UI",Arial,sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  transition:0.3s;
}

body.dark{ background: var(--dark-bg); color:white; }
body.light{ background: var(--light-bg); color:#111; }

h1{ margin:20px 0; font-size:2.5rem; letter-spacing:3px; }

.scoreboard{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  width:90%;
  max-width:800px;
}

.panel{
  background: rgba(0,0,0,0.2);
  border-radius:20px;
  padding:20px;
  text-align:center;
  backdrop-filter: blur(6px);
  transition: background 0.3s;
}

body.light .panel{ background: var(--panel-light); }

.team{ font-size:1.5rem; opacity:0.8; }

.score{
  font-size:6rem;
  font-weight:800;
  margin:10px 0;
  transition: transform 0.2s;
}

.score.animate{ transform: scale(1.2); }

.timer{ font-size:5rem; font-weight:700; margin:20px 0; }

.shotclock{ font-size:5.5rem; font-weight:700; color:var(--led-red); margin:10px 0; }
.exclusion{ font-size:4rem; font-weight:700; color:var(--led-blue); margin:10px 0; }

button{
  padding:10px 18px;
  font-size:1rem;
  border:none;
  border-radius:12px;
  margin:5px;
  cursor:pointer;
  transition:0.15s, transform 0.15s;
}

button:hover{ transform: scale(1.05); }

.controls{ display:flex; justify-content:center; flex-wrap:wrap; margin-top:10px; }

.theme-btn{
  position: fixed;
  top:10px;
  right:10px;
  padding:8px 12px;
  font-size:1rem;
  border-radius:12px;
}

.signature{
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-size: 0.85rem;
  opacity:0.45;
}

/* Responsive per telefoni */
@media (max-width:768px){
  .scoreboard{ grid-template-columns:1fr; gap:20px; }
  .score{ font-size:4rem; }
  .timer{ font-size:3rem; }
  .shotclock{ font-size:3.5rem; }
  .exclusion{ font-size:2.8rem; }
}
</style>
</head>
<body class="dark">

<button class="theme-btn" onclick="toggleTheme()">🌙 / ☀️</button>

<h1>TABELLONE PER LA MIA POLPETTA</h1>

<div class="scoreboard">
  <div class="panel">
    <div class="team">Bianchi</div>
    <div id="scoreA" class="score">0</div>
    <div class="controls">
      <button onclick="goal('A')">GOAL +1</button>
      <button onclick="removeGoal('A')">-1</button>
    </div>
  </div>
  <div class="panel">
    <div class="team">Neri</div>
    <div id="scoreB" class="score">0</div>
    <div class="controls">
      <button onclick="goal('B')">GOAL +1</button>
      <button onclick="removeGoal('B')">-1</button>
    </div>
  </div>
</div>

<div class="timer" id="gameTimer">08:00</div>

<div class="controls">
  <button onclick="startGame()">START</button>
  <button onclick="stopGame()">STOP</button>
  <button onclick="nextPeriod()">PROSSIMO TEMPO</button>
</div>

<div>Tempo: <span id="period">1</span></div>

<br>

<div class="panel">
<h2>Shot Clock</h2>
<div id="shotClock" class="shotclock">28</div>
<div class="controls">
  <button onclick="resetShot()">RESET 28</button>
</div>
</div>

<br>

<div class="panel">
<h2>Espulsione</h2>
<div id="exclusion" class="exclusion">18</div>
<div class="controls">
  <button onclick="startExclusion()">ESPULSIONE 18s</button>
</div>
</div>

<div class="signature">Realizzato da Alessandro Longoni</div>

<script>
let scoreA=0, scoreB=0;
let minutes=8, seconds=0, gameInterval;
let shot=28, shotInterval;
let period=1;

function goal(team){
  if(team==="A") scoreA++, animateScore("scoreA");
  if(team==="B") scoreB++, animateScore("scoreB");
  document.getElementById("scoreA").innerText = scoreA;
  document.getElementById("scoreB").innerText = scoreB;
  resetShot();
}

function removeGoal(team){
  if(team==="A" && scoreA>0) scoreA--, animateScore("scoreA");
  if(team==="B" && scoreB>0) scoreB--, animateScore("scoreB");
  document.getElementById("scoreA").innerText = scoreA;
  document.getElementById("scoreB").innerText = scoreB;
}

function animateScore(id){
  const el=document.getElementById(id);
  el.classList.add("animate");
  setTimeout(()=>el.classList.remove("animate"),200);
}

function updateGame(){
  document.getElementById("gameTimer").innerText = 
    `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
}

function updateShot(){ document.getElementById("shotClock").innerText = shot; }

function startGame(){
  clearInterval(gameInterval);
  clearInterval(shotInterval);
  gameInterval = setInterval(()=>{
    if(seconds===0){
      if(minutes===0){ clearInterval(gameInterval); clearInterval(shotInterval); beep(); return; }
      minutes--; seconds=59;
    }else seconds--;
    updateGame();
  },1000);
  shotInterval = setInterval(()=>{
    if(shot>0){ shot--; updateShot(); }
    else{ beep(); }
  },1000);
}

function stopGame(){ clearInterval(gameInterval); clearInterval(shotInterval); }

function resetShot(){ shot=28; updateShot(); }

function nextPeriod(){
  if(period<4){
    period++;
    minutes=8; seconds=0; resetShot();
    updateGame(); updateShot();
    document.getElementById("period").innerText=period;
  }
}

function startExclusion(){
  let ex=18;
  document.getElementById("exclusion").innerText=ex;
  let exInterval=setInterval(()=>{
    if(ex>0){ ex--; document.getElementById("exclusion").innerText=ex; }
    else clearInterval(exInterval);
  },1000);
}

function beep(){
  let ctx=new (window.AudioContext||window.webkitAudioContext)();
  let osc=ctx.createOscillator();
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.4);
}

function toggleTheme(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

updateGame(); updateShot();
</script>

</body>
</html>
